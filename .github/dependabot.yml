# Please see the documentation for all configuration options:
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    # Wait 7 days after a release before opening an update PR, giving time for
    # malware/CVE advisories to surface (mirrors the uv `exclude-newer` cooldown).
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7

  - package-ecosystem: "uv"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    groups:
      # Individual pull requests for major/minor updates and grouped for patch updates
      patch-updates:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
    open-pull-requests-limit: 10
    # Wait 7 days after a release before opening an update PR, giving time for
    # malware/CVE advisories to surface (mirrors the uv `exclude-newer` cooldown).
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
