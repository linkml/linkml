name: Update Feature Dashboard

on:
  push:
    branches: [main]
    paths:
      - "packages/linkml/src/linkml/generators/**"
      - "tests/linkml/test_compliance/**"
      - "scripts/generate_dashboard.py"
  workflow_dispatch:

env:
  UV_VERSION: "0.7.13"

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    if: github.repository == 'linkml/linkml'
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tags if not run from main repo
        if: github.repository != 'linkml/linkml'
        run: |
          git remote add upstream https://github.com/linkml/linkml
          git fetch upstream --tags

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run compliance tests
        run: uv run pytest tests/linkml/test_compliance/ --with-output -q

      - name: Generate dashboard
        run: uv run python scripts/generate_dashboard.py

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet docs/generators/dashboard.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated dashboard
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/generators/dashboard.md
          git commit -m "docs: update feature dashboard from compliance tests

          Auto-generated by the update-feature-dashboard workflow.
          "
          git push
