name: minimal_redundant_slot_usage
description: Minimal schema to test redundant slot usage removal
id: https://example.com/minimal_redundant_slot_usage
imports:
- linkml:types

prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  test:
    prefix_prefix: test
    prefix_reference: https://example.com/test/

types:
  string:
    name: string
    from_schema: https://example.com/minimal_redundant_slot_usage
    base: str
    uri: xsd:string

enums:
  ecosystem_enum:
    name: ecosystem_enum
    from_schema: https://example.com/minimal_redundant_slot_usage
    permissible_values:
      Environmental:
        text: Environmental
      Host-associated:
        text: Host-associated
      Engineered:
        text: Engineered

slots:
  gold_path_field:
    name: gold_path_field
    description: Base slot for GOLD path fields
    from_schema: https://example.com/minimal_redundant_slot_usage
    abstract: true
    
  ecosystem:
    name: ecosystem
    description: An ecosystem is a combination of a physical environment (abiotic factors) and all the organisms (biotic factors) that interact with this environment. Ecosystem is in position 1/5 in a GOLD path.
    from_schema: https://example.com/minimal_redundant_slot_usage
    slot_uri: test:ecosystem
    is_a: gold_path_field
    
  ecosystem_category:
    name: ecosystem_category
    description: Ecosystem categories represent divisions within the ecosystem
    from_schema: https://example.com/minimal_redundant_slot_usage
    slot_uri: test:ecosystem_category
    
  ecosystem_type:
    name: ecosystem_type
    description: Ecosystem type
    from_schema: https://example.com/minimal_redundant_slot_usage
    slot_uri: test:ecosystem_type
    
  ecosystem_subtype:
    name: ecosystem_subtype
    description: Ecosystem subtype
    from_schema: https://example.com/minimal_redundant_slot_usage
    slot_uri: test:ecosystem_subtype
    
  sample_name:
    name: sample_name
    description: Sample name
    from_schema: https://example.com/minimal_redundant_slot_usage
    slot_uri: test:sample_name

classes:
  Biosample:
    name: Biosample
    from_schema: https://example.com/minimal_redundant_slot_usage
    slots:
    - ecosystem
    - ecosystem_category
    - ecosystem_type
    - ecosystem_subtype
    - sample_name
  soil_jgi_mg:  # This is the class used in the test
    name: soil_jgi_mg
    from_schema: https://example.com/minimal_redundant_slot_usage
    is_a: Biosample
    slot_usage:
      ecosystem:
        name: ecosystem
        description: An ecosystem is a combination of a physical environment (abiotic factors) and all the organisms (biotic factors) that interact with this environment. Ecosystem is in position 1/5 in a GOLD path.
        slot_group: Sample ID
        required: true
        range: ecosystem_enum
        owner: Biosample
      ecosystem_category:
        name: ecosystem_category
        description: Ecosystem categories represent divisions within the ecosystem
        slot_group: Sample ID
        required: false
        owner: Biosample
      ecosystem_type:
        name: ecosystem_type
        description: Ecosystem type
        slot_group: Sample ID
        owner: Biosample
      ecosystem_subtype:
