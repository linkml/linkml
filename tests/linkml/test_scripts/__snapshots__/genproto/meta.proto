syntax = "proto3";
package kitchen_sink;
// metamodel_version: 1.11.0
// a provence-generating activity
message Activity {
  string id = 1;
  string startedAtTime = 2;
  string endedAtTime = 3;
  Activity wasInformedBy = 4;
  Agent wasAssociatedWith = 5;
  string used = 6;
  string description = 7;
}
message Address {
  string street = 1;
  string city = 2;
  string altitude = 3;
}
// a provence-generating agent
message Agent
 {
  string id = 1
  agent actedOnBehalfOf = 0
  activity wasInformedBy = 0
 }
message AnyOfClasses
 {
  string attribute2 = 0
 }
message AnyOfEnums
 {
  string attribute3 = 0
 }
message AnyOfMix
 {
  string attribute4 = 0
 }
message AnyOfSimpleType
 {
  string attribute1 = 0
 }
message BirthEvent
 {
  date startedAtTime = 0
  date endedAtTime = 0
  boolean isCurrent = 0
  anyObject metadata = 0
  place inLocation = 0
 }
message ClassWithSpaces
 {
  string slotWithSpace1 = 0
 }
message CodeSystem
 {
  string id = 1
  string name = 2
  longEnum longId = 0
 }
message Company
 {
  string id = 1
  string name = 2
 repeated  string aliases = 0
  person ceo = 0
 }
message Concept
 {
  string id = 1
  string name = 2
  codeSystem inCodeSystem = 0
 }
message Dataset
 {
  anyObject metadata = 0
 repeated  person persons = 0
 repeated  company companies = 0
 repeated  activity activities = 0
 repeated  codeSystem codeSystems = 0
 }
message DiagnosisConcept
 {
  string id = 1
  string name = 2
  codeSystem inCodeSystem = 0
 }
message EmploymentEvent
 {
  date startedAtTime = 0
  date endedAtTime = 0
  boolean isCurrent = 0
  anyObject metadata = 0
  company employedAt = 0
  string type = 0
 }
message EqualsString
 {
  string attribute5 = 0
 }
message EqualsStringIn
 {
  string attribute6 = 0
 }
message Event
 {
  date startedAtTime = 0
  date endedAtTime = 0
  boolean isCurrent = 0
  anyObject metadata = 0
 }
message FakeClass
 {
  string testAttribute = 0
 }
message FamilialRelationship
 {
  date startedAtTime = 0
  date endedAtTime = 0
  cordialnessEnum cordialness = 0
  familialRelationshipType type = 0
  person relatedTo = 0
 }
message MarriageEvent
 {
  date startedAtTime = 0
  date endedAtTime = 0
  boolean isCurrent = 0
  anyObject metadata = 0
  person marriedTo = 0
  place inLocation = 0
 }
message MedicalEvent
 {
  date startedAtTime = 0
  date endedAtTime = 0
  boolean isCurrent = 0
  anyObject metadata = 0
  place inLocation = 0
  diagnosisConcept diagnosis = 0
  procedureConcept procedure = 0
 }
// An organization.
// 
// This description
// includes newlines
// 
// ## Markdown headers
// 
//  * and
//  * a
//  * list
message Organization {
  string id = 1;
  string name = 2;
  repeated string aliases = 3;
}
// A person, living or dead
message Person {
  string id = 1;
  string name = 2;
  repeated EmploymentEvent hasEmploymentHistory = 7;
  repeated FamilialRelationship hasFamilialRelationships = 3;
  repeated MedicalEvent hasMedicalHistory = 5;
  int32 ageInYears = 4;
  repeated Address addresses = 6;
  BirthEvent hasBirthEvent = 8;
  string speciesName = 9;
  int32 stomachCount = 10;
  LifeStatusEnum isLiving = 11;
  repeated string aliases = 12;
}
message Place {
  string id = 1;
  string name = 2;
  repeated string aliases = 3;
}
message ProcedureConcept {
  string id = 1;
  string name = 2;
  CodeSystem inCodeSystem = 3;
}
message Relationship {
  string startedAtTime = 1;
  string endedAtTime = 2;
  string relatedTo = 3;
  string type = 4;
  CordialnessEnum cordialness = 5;
}
message SubSubClass2 {
  string slotWithSpace1 = 1;
  ClassWithSpaces slotWithSpace2 = 2;
}
message SubclassTest {
  string slotWithSpace1 = 1;
  ClassWithSpaces slotWithSpace2 = 2;
}
// Same depth as Sub sub class 1
message TubSubClass1 {
  string slotWithSpace1 = 1;
  ClassWithSpaces slotWithSpace2 = 2;
}
message WithLocation {
  Place inLocation = 1;
}

enum CordialnessEnum {
  CORDIALNESS_ENUM_UNSPECIFIED = 0;
  CORDIALNESS_ENUM_HEARTFELT = 1;
  CORDIALNESS_ENUM_HATEFUL = 2;
  CORDIALNESS_ENUM_INDIFFERENT = 3;
}
enum DiagnosisType {
  DIAGNOSIS_TYPE_UNSPECIFIED = 0;
  DIAGNOSIS_TYPE_TODO = 1;
}
// codes for different kinds of employment/HR related events
enum EmploymentEventType {
  EMPLOYMENT_EVENT_TYPE_UNSPECIFIED = 0;
  EMPLOYMENT_EVENT_TYPE_HIRE = 1;
  EMPLOYMENT_EVENT_TYPE_FIRE = 2;
  EMPLOYMENT_EVENT_TYPE_PROMOTION = 3;
  EMPLOYMENT_EVENT_TYPE_TRANSFER = 4;
}
enum FamilialRelationshipType {
  FAMILIAL_RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  FAMILIAL_RELATIONSHIP_TYPE_SIBLING_OF = 1;
  FAMILIAL_RELATIONSHIP_TYPE_PARENT_OF = 2;
  FAMILIAL_RELATIONSHIP_TYPE_CHILD_OF = 3;
}
enum KitchenStatus {
  KITCHEN_STATUS_UNSPECIFIED = 0;
  KITCHEN_STATUS_DIRTY = 1;
  KITCHEN_STATUS_CLEAN = 2;
}
enum LifeStatusEnum {
  LIFE_STATUS_ENUM_UNSPECIFIED = 0;
  LIFE_STATUS_ENUM_LIVING = 1;
  LIFE_STATUS_ENUM_DEAD = 2;
  LIFE_STATUS_ENUM_UNKNOWN = 3;
}
