  LONG_ENUM_ETA_SEQUENCE_IDENTIFIER07_LONG_PATTERN_LONG_PATTERN_LONG_PATTERN = 7;
  LONG_ENUM_THETA_SEQUENCE_IDENTIFIER08_LONG_PATTERN_LONG_PATTERN_LONG_PATTERN = 8;
  LONG_ENUM_IOTA_SEQUENCE_IDENTIFIER09_LONG_PATTERN_LONG_PATTERN_LONG_PATTERN = 9;
  LONG_ENUM_KAPPA_SEQUENCE_IDENTIFIER10_LONG_PATTERN_LONG_PATTERN_LONG_PATTERN = 10;
  LONG_ENUM_LAMBDA_SEQUENCE_IDENTIFIER11_LONG_PATTERN_LONG_PATTERN_LONG_PATTERN = 11;
  LONG_ENUM_MU_SEQUENCE_IDENTIFIER12_LONG_PATTERN_LONG_PATTERN_LONG_PATTERN = 12;
