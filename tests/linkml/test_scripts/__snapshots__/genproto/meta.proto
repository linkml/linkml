syntax = "proto3";
package kitchen_sink;
// metamodel_version: 1.11.0
// a provence-generating activity
message Activity {
  string id = 1;
  string started_at_time = 2;
  string ended_at_time = 3;
  Activity was_informed_by = 4;
  Agent was_associated_with = 5;
  string used = 6;
  string description = 7;
}
message Address {
  string street = 1;
  string city = 2;
  string altitude = 3;
}
// a provence-generating agent
message Agent {
  string id = 1;
  Agent acted_on_behalf_of = 2;
  Activity was_informed_by = 3;
}
// Example of unconstrained class
message AnyObject {
}
message AnyOfClasses {
  string attribute2 = 1;
}
message AnyOfEnums {
  string attribute3 = 1;
}
message AnyOfMix {
  string attribute4 = 1;
}
message AnyOfSimpleType {
  string attribute1 = 1;
}
message BirthEvent {
  string started_at_time = 1;
  string ended_at_time = 2;
  bool is_current = 3;
  // Example of a slot that has an unconstrained range
  AnyObject metadata = 4;
  Place in_location = 5;
}
message ClassWithSpaces {
  string slot_with_space1 = 1;
}
message CodeSystem {
  string id = 1;
  string name = 2;
  LongEnum long_id = 3;
}
message Company {
  string id = 1;
  string name = 2;
  repeated string aliases = 3;
  Person ceo = 4;
}
message Concept {
  string id = 1;
  string name = 2;
  CodeSystem in_code_system = 3;
}
message Dataset {
  // Example of a slot that has an unconstrained range
  AnyObject metadata = 1;
  repeated Person persons = 2;
  repeated Company companies = 3;
  repeated Activity activities = 4;
  repeated CodeSystem code_systems = 5;
}
message DiagnosisConcept {
  string id = 1;
  string name = 2;
  CodeSystem in_code_system = 3;
}
message EmploymentEvent {
  string started_at_time = 1;
  string ended_at_time = 2;
  bool is_current = 3;
  // Example of a slot that has an unconstrained range
  AnyObject metadata = 4;
  Company employed_at = 5;
  string type = 6;
}
message EqualsString {
  string attribute5 = 1;
}
message EqualsStringIn {
  string attribute6 = 1;
}
message Event {
  string started_at_time = 1;
  string ended_at_time = 2;
  bool is_current = 3;
  // Example of a slot that has an unconstrained range
  AnyObject metadata = 4;
}
message FakeClass {
  string test_attribute = 1;
}
message FamilialRelationship {
  string started_at_time = 1;
  string ended_at_time = 2;
  string cordialness = 3;
  FamilialRelationshipType type = 4;
  Person related_to = 5;
}
message Friend {
  string name = 2;
}
message HasAliases {
  repeated string aliases = 1;
}
message MarriageEvent {
  string started_at_time = 1;
  string ended_at_time = 2;
  bool is_current = 3;
  // Example of a slot that has an unconstrained range
  AnyObject metadata = 4;
  Person married_to = 5;
  Place in_location = 6;
}
message MedicalEvent {
  string started_at_time = 1;
  string ended_at_time = 2;
  bool is_current = 3;
  // Example of a slot that has an unconstrained range
  AnyObject metadata = 4;
  Place in_location = 5;
  DiagnosisConcept diagnosis = 6;
  ProcedureConcept procedure = 7;
}
// An organization.
// 
// This description
// includes newlines
// 
// ## Markdown headers
// 
//  * and
//  * a
//  * list
message Organization {
  string id = 1;
  string name = 2;
  repeated string aliases = 3;
}
// A person, living or dead
message Person {
  string id = 1;
  string name = 2;
  repeated EmploymentEvent has_employment_history = 7;
  repeated FamilialRelationship has_familial_relationships = 3;
  repeated MedicalEvent has_medical_history = 5;
  // number of years since birth
  int32 age_in_years = 4;
  repeated Address addresses = 6;
  BirthEvent has_birth_event = 8;
  string species_name = 9;
  int32 stomach_count = 10;
  LifeStatusEnum is_living = 11;
  repeated string aliases = 12;
}
message Place {
  string id = 1;
  string name = 2;
  repeated string aliases = 3;
}
message ProcedureConcept {
  string id = 1;
  string name = 2;
  CodeSystem in_code_system = 3;
}
message Relationship {
  string started_at_time = 1;
  string ended_at_time = 2;
  string related_to = 3;
  string type = 4;
  CordialnessEnum cordialness = 5;
}
message SubSubClass2 {
  string slot_with_space1 = 1;
  ClassWithSpaces slot_with_space2 = 2;
}
message SubclassTest {
  string slot_with_space1 = 1;
  ClassWithSpaces slot_with_space2 = 2;
}
// Same depth as Sub sub class 1
message TubSubClass1 {
  string slot_with_space1 = 1;
  ClassWithSpaces slot_with_space2 = 2;
}
message WithLocation {
  Place in_location = 1;
}

enum CordialnessEnum {
  CORDIALNESS_ENUM_UNSPECIFIED = 0;
  CORDIALNESS_ENUM_HEARTFELT = 1;
  CORDIALNESS_ENUM_HATEFUL = 2;
  CORDIALNESS_ENUM_INDIFFERENT = 3;
}
enum DiagnosisType {
  DIAGNOSIS_TYPE_UNSPECIFIED = 0;
  DIAGNOSIS_TYPE_TODO = 1;
}
// codes for different kinds of employment/HR related events
enum EmploymentEventType {
  EMPLOYMENT_EVENT_TYPE_UNSPECIFIED = 0;
  EMPLOYMENT_EVENT_TYPE_HIRE = 1;
  EMPLOYMENT_EVENT_TYPE_FIRE = 2;
  EMPLOYMENT_EVENT_TYPE_PROMOTION = 3;
  EMPLOYMENT_EVENT_TYPE_TRANSFER = 4;
}
enum FamilialRelationshipType {
  FAMILIAL_RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  FAMILIAL_RELATIONSHIP_TYPE_SIBLING_OF = 1;
  FAMILIAL_RELATIONSHIP_TYPE_PARENT_OF = 2;
  FAMILIAL_RELATIONSHIP_TYPE_CHILD_OF = 3;
}
enum KitchenStatus {
  KITCHEN_STATUS_UNSPECIFIED = 0;
  KITCHEN_STATUS_DIRTY = 1;
  KITCHEN_STATUS_CLEAN = 2;
}
enum LifeStatusEnum {
  LIFE_STATUS_ENUM_UNSPECIFIED = 0;
  LIFE_STATUS_ENUM_LIVING = 1;
  LIFE_STATUS_ENUM_DEAD = 2;
  LIFE_STATUS_ENUM_UNKNOWN = 3;
}
// An example enum whose joined values will exceed 255 characters.
