id: https://w3id.org/linkml/examples/cardinality
name: test_multivalued_slot_cardinality
prefixes:
  linkml: https://w3id.org/linkml/
  ex: https://w3id.org/linkml/examples/cardinality/
imports:
  - linkml:types
default_range: string
default_prefix: ex

classes:
  VariableClass:
    slots:
      - list_min_max_size

  ExactClass:
    slots:
      - list_exact_size

  ParentClass:
    slots:
      - inherited_slot
      - restricted_slot

  ChildWithZeroMaxCard:
    is_a: ParentClass
    slot_usage:
      restricted_slot:
        maximum_cardinality: 0

  ChildWithZeroExactCard:
    is_a: ParentClass
    slot_usage:
      restricted_slot:
        exact_cardinality: 0

  ChildWithZeroMinCard:
    is_a: ParentClass
    slot_usage:
      restricted_slot:
        minimum_cardinality: 0

  ChildWithRequiredAndZeroMinCard:
    is_a: ParentClass
    slot_usage:
      restricted_slot:
        required: true
        minimum_cardinality: 0

slots:
  list_min_max_size:
    range: integer
    multivalued: true
    minimum_cardinality: 2
    maximum_cardinality: 5

  list_exact_size:
    range: integer
    multivalued: true
    exact_cardinality: 3

  inherited_slot:
    range: string
    multivalued: true

  restricted_slot:
    range: string
    multivalued: true
