openapi: 3.0.3
info:
  title: LinkML tests - renaming
  version: 1.0.0
servers:
  - url: https://example.org/
security:
  - PayloadSignature: []
paths:
  /api/persons:
    get:
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonResource"

components:
  schemas:
    PersonResource:
      type: object
      x-linkml-schema: https://w3id.org/linkml/tests/kitchen_sink
      x-linkml-source: Person
